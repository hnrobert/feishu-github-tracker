# =========================================
# server.yaml
# -----------------------------------------
# 用于定义 Webhook 服务本体的监听配置、日志、校验等信息
# =========================================

server:
  host: "0.0.0.0" # Webhook监听主机
  port: 4594 # Webhook监听端口
  secret: "your_secret" # 用于验证GitHub X-Hub-Signature的密钥
  log_level: "info" # 可选: debug, info, warn, error
  max_payload_size: 5MB # 限制单次Webhook body大小
  timeout: 15 # 单次请求处理超时 (秒)

# 允许的来源（用于白名单过滤，可选）
allowed_sources:
  - "github.com"
  - "api.github.com"
  - "your-github-enterprise-domain.com"

# =========================================
# 管理面板 / Management Panel
# -----------------------------------------
# 可选。配置管理员密码后，可在 http://<host>:<port>/ 访问 Web 管理面板。
# Optional. Once an admin password is set, the web panel is available at http://<host>:<port>/.
#
# 设置管理员密码的方式（任选其一）：
#   1) 环境变量 PANEL_PASSWORD（明文，启动时自动 bcrypt 哈希）—— 推荐 / recommended
#   2) password_hash：bcrypt 哈希。可用 htpasswd 生成：
#        htpasswd -bnBC 10 "" yourpassword | tr -d ':\n' | sed 's/^\$2y/\$2a/'
#   3) password：明文（方便但不推荐，会在启动时哈希）
panel:
  enabled: true
  # password_hash: "$2a$10$ReplaceWithYourBcryptHash"
  # password: "change-me"
  secret: "change-me-panel-jwt-secret" # JWT 签名密钥；留空则每次启动随机生成（会登出所有人）/ JWT secret; blank => ephemeral per restart


