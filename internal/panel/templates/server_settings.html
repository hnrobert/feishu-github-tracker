{{define "title"}}{{t . "settings.title"}} · Feishu GitHub Tracker{{end}}
{{define "content"}}
<div class="pageHead">
  <h2>{{t . "settings.title"}}</h2>
  <div class="sub">{{t . "settings.subtitle"}}</div>
</div>

<form id="settings-form" method="post" action="/settings/save" class="card">
  <div class="row">
    <div>
      <label>{{t . "settings.host"}}</label>
      <input type="text" name="host" value="{{.ServerForm.Host}}" />
    </div>
    <div>
      <label>{{t . "settings.port"}}</label>
      <input type="number" name="port" value="{{.ServerForm.Port}}" />
    </div>
  </div>

  <div class="row">
    <div>
      <label>{{t . "settings.secret"}} <span class="muted">({{t . "settings.secretHint"}})</span></label>
      <input type="text" name="secret" value="{{.ServerForm.Secret}}" />
    </div>
    <div>
      <label>{{t . "settings.logLevel"}}</label>
      <select name="log_level">
        <option value="debug" {{if eq $.ServerForm.LogLevel "debug"}}selected{{end}}>debug</option>
        <option value="info" {{if eq $.ServerForm.LogLevel "info"}}selected{{end}}>info</option>
        <option value="warn" {{if eq $.ServerForm.LogLevel "warn"}}selected{{end}}>warn</option>
        <option value="error" {{if eq $.ServerForm.LogLevel "error"}}selected{{end}}>error</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div>
      <label>{{t . "settings.maxPayload"}}</label>
      <input type="text" name="max_payload_size" value="{{.ServerForm.MaxPayloadSize}}" placeholder="5MB" />
    </div>
    <div>
      <label>{{t . "settings.timeout"}} <span class="muted">({{t . "settings.seconds"}})</span></label>
      <input type="number" name="timeout" value="{{.ServerForm.Timeout}}" />
    </div>
  </div>

  <label class="checkLine">
    <input type="checkbox" name="match_all_rules" {{if .ServerForm.MatchAllRules}}checked{{end}} />
    <span>{{t . "settings.matchAll"}}</span>
  </label>
  <div class="note">{{t . "settings.matchAllHint"}}</div>

  <label>{{t . "settings.allowedSources"}} <span class="muted">({{t . "settings.onePerLine"}})</span></label>
  <textarea name="allowed_sources" placeholder="github.com&#10;api.github.com">{{.ServerForm.AllowedSources}}</textarea>

  <hr style="border:none; border-top:1px solid var(--border); margin:20px 0;" />

  <h3 style="margin-bottom:8px;">{{t . "settings.account"}}</h3>

  <label>{{t . "settings.adminUsername"}}</label>
  <input type="text" name="panel_username" value="{{.ServerForm.Username}}" />

  <label>{{t . "settings.currentPassword"}} <span class="muted">({{t . "settings.currentPasswordHint"}})</span></label>
  <input type="password" name="panel_old_password" autocomplete="current-password" />

  <label>{{t . "settings.newPassword"}} <span class="muted">({{t . "settings.newPasswordHint"}})</span></label>
  <input type="password" name="panel_password" autocomplete="new-password" />

  <label>{{t . "settings.confirmPassword"}}</label>
  <input type="password" name="panel_password_confirm" autocomplete="new-password" />
  <div class="note">{{t . "settings.passwordHint"}}</div>

  <div class="actions" style="margin-top:18px;">
    <button class="btn primary" type="submit">{{t . "action.save"}}</button>
  </div>
  <div class="note">
    ⚠️ {{t . "settings.saveWarning"}}
  </div>
</form>
<script>
  // SHA-256 hash the password fields in the browser before submit so plaintext
  // never travels to the server. Hashes are placed in hidden fields and the
  // visible fields' names are dropped, so nothing visible changes (the user
  // keeps seeing masked dots). sha256Hex/addHidden are defined in the layout.
  (function () {
    var form = document.getElementById('settings-form');
    if (!form) return;
    var oldEl = form.querySelector('[name="panel_old_password"]');
    var newEl = form.querySelector('[name="panel_password"]');
    var confEl = form.querySelector('[name="panel_password_confirm"]');
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      try {
        if (newEl && newEl.value) {
          if (confEl && newEl.value !== confEl.value) {
            alert('{{t . "settings.passwordMismatch"}}');
            confEl.focus();
            return;
          }
          if (!oldEl || !oldEl.value) {
            alert('{{t . "settings.currentPasswordRequired"}}');
            oldEl.focus();
            return;
          }
          var newHash = await sha256Hex(newEl.value);
          var oldHash = await sha256Hex(oldEl.value);
          addHidden(form, newEl.name, newHash); newEl.removeAttribute('name');
          addHidden(form, confEl.name, newHash); confEl.removeAttribute('name');
          addHidden(form, oldEl.name, oldHash); oldEl.removeAttribute('name');
        }
      } catch (err) { return; }
      form.submit();
    });
  })();
</script>
{{end}}
