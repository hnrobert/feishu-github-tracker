{{define "title"}}{{t . "events.title"}} · Feishu GitHub Tracker{{end}}
{{define "content"}}
<div class="pageHead">
  <h2>{{t . "events.title"}}</h2>
  <div class="sub">{{t . "events.subtitle"}}</div>
</div>

<form method="post" action="/events/save" class="card">
  <label>events.yaml</label>
  <textarea name="events_yaml" class="code-lg">{{.EventsYAML}}</textarea>
  <div class="note">{{t . "events.preserve"}}</div>
  <div class="actions" style="margin-top:14px;">
    <button class="btn primary" type="submit">{{t . "action.save"}}</button>
  </div>
</form>
{{end}}
