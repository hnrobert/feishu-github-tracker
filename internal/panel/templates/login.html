{{define "title"}}{{t . "login.title"}} · Feishu GitHub Tracker{{end}}
{{define "content"}}
<div class="card">
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">
    <img class="logo" src="/static/logo.jpg" alt="logo" style="width:40px;height:40px;border-radius:10px;object-fit:cover;box-shadow:0 4px 12px rgba(78,172,248,.35);" />
    <h2 style="margin:0;">{{t . "login.title"}}</h2>
  </div>
  <div class="muted" style="margin-bottom:16px; font-size:13px;">
    <br />{{t . "login.description"}}
  </div>
  <form id="login-form" method="post" action="/login">
    <label>{{t . "login.username"}}</label>
    <input type="text" name="username" autocomplete="username" autofocus required />
    <label>{{t . "login.password"}}</label>
    <input type="password" name="password" id="login-password" autocomplete="current-password" required />
    <div class="actions" style="justify-content:flex-end; margin-top:18px;">
      <button class="btn primary" type="submit">{{t . "action.signIn"}}</button>
    </div>
  </form>
</div>
<script>
  // Hash the password with SHA-256 in the browser before submit, so the
  // plaintext never leaves the client. The hash goes into a hidden field and
  // the visible field's name is dropped, so the hash never appears in the input
  // (the user just sees their masked dots). sha256Hex/addHidden are in layout.
  (function () {
    var form = document.getElementById('login-form');
    if (!form) return;
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var pw = document.getElementById('login-password');
      if (!pw || !pw.value) { form.submit(); return; }
      try {
        var name = pw.name;
        var hashed = await sha256Hex(pw.value);
        addHidden(form, name, hashed);
        pw.removeAttribute('name');
      } catch (err) { return; }
      form.submit();
    });
  })();
</script>
{{end}}
