{{define "title"}}登录 · Login · Feishu GitHub Tracker{{end}}
{{define "content"}}
<div class="card">
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:6px;">
    <img class="logo" src="/static/logo.jpg" alt="logo" style="width:40px;height:40px;border-radius:10px;object-fit:cover;box-shadow:0 4px 12px rgba(78,172,248,.35);" />
    <h2 style="margin:0;">登录 / Login</h2>
  </div>
  <div class="muted" style="margin-bottom:16px; font-size:13px;">
    <br />输入管理员密码以进入管理面板。<br />Enter the admin password to access the management panel.
  </div>
  <form id="login-form" method="post" action="/login">
    <label>用户名 / Username</label>
    <input type="text" name="username" autocomplete="username" autofocus required />
    <label>管理员密码 / Admin password</label>
    <input type="password" name="password" id="login-password" autocomplete="current-password" required />
    <div class="actions" style="justify-content:flex-end; margin-top:18px;">
      <button class="btn primary" type="submit">登录 / Sign in</button>
    </div>
  </form>
</div>
<script>
  // Hash the password with SHA-256 in the browser before submit, so the
  // plaintext never leaves the client. sha256Hex is defined in the layout.
  (function () {
    var form = document.getElementById('login-form');
    if (!form) return;
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var pw = document.getElementById('login-password');
      if (!pw || !pw.value) return;
      try { pw.value = await sha256Hex(pw.value); } catch (err) { return; }
      form.submit();
    });
  })();
</script>
{{end}}
